<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three-Body Simulator</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="topbar-title">
          <h1 id="app-title"></h1>
          <span id="lang-switcher"></span>
        </div>
        <div class="topbar-meta" id="app-subtitle"></div>
      </header>

      <main class="layout">
        <section class="canvas-wrap">
          <canvas id="canvas"></canvas>
          <div class="canvas-overlay" id="status"></div>
          <div class="canvas-toolbar">
            <button id="btn-play" class="btn primary"></button>
            <button id="btn-reset" class="btn"></button>
            <button id="btn-step" class="btn"></button>
            <button id="btn-clear-trails" class="btn"></button>
            <label class="speed">
              <span id="speed-label"></span>
              <input id="speed" type="range" min="0.1" max="5" step="0.1" value="1" />
              <span id="speed-val">1.0×</span>
            </label>
          </div>
        </section>

        <aside class="sidebar">
          <div class="tabs">
            <button class="tab active" data-tab="presets" id="tab-presets"></button>
            <button class="tab" data-tab="manual" id="tab-manual"></button>
            <button class="tab" data-tab="random" id="tab-random"></button>
          </div>

          <div class="tab-panel active" data-panel="presets">
            <div id="preset-list" class="preset-list"></div>
          </div>

          <div class="tab-panel" data-panel="manual">
            <div id="manual-controls" class="manual-controls"></div>
            <button id="btn-apply-manual" class="btn primary full"></button>
          </div>

          <div class="tab-panel" data-panel="random">
            <p class="hint" id="random-hint"></p>
            <label class="field">
              <span id="rnd-pos-label"></span>
              <input id="rnd-pos" type="range" min="0.5" max="3" step="0.1" value="1.5" />
              <span id="rnd-pos-val">1.5</span>
            </label>
            <label class="field">
              <span id="rnd-vel-label"></span>
              <input id="rnd-vel" type="range" min="0" max="1" step="0.05" value="0.4" />
              <span id="rnd-vel-val">0.4</span>
            </label>
            <button id="btn-random" class="btn primary full"></button>
          </div>

          <div id="info-panel" class="info-panel"></div>
        </aside>
      </main>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
